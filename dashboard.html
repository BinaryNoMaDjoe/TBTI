<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TBTI · 数据面板</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & VARIABLES (same as main app)
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f7f4ef;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #8c8880;
  --text-muted: #b8b4ac;
  --border: #e8e4dc;
  --accent: #2c2c2c;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.03);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.05), 0 2px 6px rgba(0,0,0,0.03);
  --shadow-lg: 0 12px 32px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.03);
  --radius-sm: 10px;
  --radius: 16px;
  --radius-lg: 20px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --camp-expedition: #b8956a;
  --camp-stroll: #6b8b6f;
  --camp-wild: #c47d7a;
  --camp-adventure: #7b8cb8;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }

body {
  font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', 'Georgia', 'Times New Roman', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.7;
  letter-spacing: 0.01em;
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 14px 40px;
  border-radius: 50px;
  font-family: inherit;
  font-size: 0.95rem;
  font-weight: 500;
  letter-spacing: 0.03em;
  cursor: pointer;
  border: none;
  transition: all var(--transition);
  text-decoration: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn-outline {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-outline:active { background: rgba(0,0,0,0.02); }
.btn-sm { padding: 10px 24px; font-size: 0.85rem; }

/* Cards */
.card {
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
}
.card-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.card-title {
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--text);
}
.card-arrow {
  font-size: 0.65rem;
  color: var(--text-muted);
  transition: transform var(--transition);
}
.card.open .card-arrow { transform: rotate(180deg); }
.card-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
}
.card.open .card-body { max-height: 3000px; }
.card-body-inner { padding: 0 20px 20px; }

/* ---- Dashboard layout ---- */
.dashboard-view {
  padding-top: 16px;
}

.dash-header {
  text-align: center;
  padding: 28px 20px 8px;
  position: relative;
}

.dash-title {
  font-size: 1.4rem;
  font-weight: 600;
  letter-spacing: 0.05em;
  color: var(--text);
}

.dash-subtitle {
  font-size: 0.72rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-top: 4px;
  display: block;
}

/* ---- Overview stat cards ---- */
.dash-stat-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 16px 0 20px;
  padding: 0;
}

.dash-stat-card {
  background: var(--card);
  border-radius: var(--radius-sm);
  padding: 16px 10px;
  text-align: center;
  box-shadow: var(--shadow-sm);
}

.dash-stat-value {
  font-size: 1.5rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
}

.dash-stat-label {
  font-size: 0.68rem;
  color: var(--text-muted);
  letter-spacing: 0.05em;
  margin-top: 4px;
}

/* ---- Horizontal bar chart ---- */
.dash-bar-row {
  display: flex; align-items: center;
  margin-bottom: 8px;
  font-size: 0.78rem;
}

.dash-bar-label {
  width: 72px;
  text-align: right;
  color: var(--text-secondary);
  padding-right: 10px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dash-bar-track {
  flex: 1; height: 8px;
  background: #f0ede7;
  border-radius: 4px;
  overflow: hidden;
}

.dash-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 0.6s ease;
}

.dash-bar-count {
  width: 32px;
  text-align: right;
  font-weight: 500;
  color: var(--text);
  flex-shrink: 0;
  padding-left: 8px;
  font-size: 0.72rem;
}

/* ---- Donut chart (camp) ---- */
.dash-donut-container {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 24px;
  flex-wrap: wrap;
  padding: 8px 0;
}

.dash-donut {
  width: 130px; height: 130px;
  border-radius: 50%;
  flex-shrink: 0;
  position: relative;
}

.dash-donut-hole {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 70px; height: 70px;
  border-radius: 50%;
  background: var(--card);
}

.dash-donut-center {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
}

.dash-donut-legend {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.dash-legend-item {
  display: flex; align-items: center;
  gap: 8px;
  font-size: 0.78rem;
  color: var(--text-secondary);
}

.dash-legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ---- Daily trend chart ---- */
.dash-trend-row {
  display: flex; align-items: flex-end;
  gap: 4px;
  height: 80px;
  padding: 8px 0;
}

.dash-trend-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 0;
}

.dash-trend-dots {
  display: flex;
  gap: 2px;
  justify-content: center;
  min-height: 14px;
  align-items: flex-end;
  margin-bottom: 2px;
}
.dash-trend-bar {
  width: 100%;
  border-radius: 3px 3px 0 0;
  background: var(--accent);
  min-height: 3px;
  transition: height 0.4s ease;
}

.dash-trend-label-bottom {
  font-size: 0.55rem;
  color: var(--text-muted);
  text-align: center;
  margin-top: 4px;
  white-space: nowrap;
}

/* ---- Heatmap grid ---- */
.dash-heatmap-container {
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.dash-heatmap-grid {
  display: grid;
  grid-template-columns: repeat(10, 1fr);
  gap: 4px;
  min-width: 280px;
}

.dash-heatmap-cell {
  aspect-ratio: 1;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem;
  color: rgba(255,255,255,0.8);
  cursor: default;
  transition: transform 0.15s;
  font-weight: 500;
}

.dash-heatmap-cell:hover {
  transform: scale(1.15);
  z-index: 1;
}

.dash-heatmap-dim-label {
  font-size: 0.65rem;
  color: var(--text-secondary);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  display: flex;
  align-items: center;
  justify-content: center;
  letter-spacing: 0.04em;
}

/* ---- Session filter row inside table ---- */
.dash-filter-row th {
  padding: 4px 8px 10px;
}
.dash-filter-row select {
  font-family: inherit;
  font-size: 0.68rem;
  padding: 4px 6px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--card);
  color: var(--text);
  cursor: pointer;
  width: 100%;
  max-width: 100%;
}

/* ---- Session table ---- */
.dash-session-table {
  width: 100%;
  font-size: 0.72rem;
  border-collapse: collapse;
}

.dash-session-table th {
  text-align: left;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.04em;
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
  font-size: 0.65rem;
  white-space: nowrap;
}

.dash-session-table td {
  padding: 8px 6px;
  border-bottom: 1px solid #f5f2ed;
  color: var(--text-secondary);
  white-space: nowrap;
}

/* ---- Footer ---- */
.dash-footer {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  padding: 24px 0 30px;
  margin-top: 16px;
}

.dash-storage-info {
  width: 100%;
  text-align: center;
  font-size: 0.62rem;
  color: var(--text-muted);
  letter-spacing: 0.04em;
  margin-top: 6px;
}

/* ---- Card overrides for dashboard ---- */
.dashboard-view .card { margin-bottom: 10px; }

/* ---- Empty state ---- */
.dash-empty {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-muted);
  font-size: 0.85rem;
  letter-spacing: 0.03em;
}

/* ---- Responsive: smaller stat cards on narrow screens ---- */
@media (max-width: 360px) {
  .dash-stat-row { grid-template-columns: repeat(2, 1fr); }
}


/* ---- Dashboard page layout ---- */
.dash-page {
  max-width: 600px;
  margin: 0 auto;
  padding: 16px 20px 30px;
}

@media (min-width: 601px) {
  body { padding: 20px 0; }
}
</style>
</head>
<body>

<div class="dash-page">

  <div class="dash-header">

    <span class="dash-subtitle">本地追踪数据（仅存储于本浏览器）</span>
  </div>

    </div>

  </div>

  <div class="card open" id="dash-camp">

      <span class="card-title">阵营分布</span><span class="card-arrow">▼</span>
    </div>

  </div>

  <div class="card" id="dash-image-rank">

      <span class="card-title">图片生成排行</span><span class="card-arrow">▼</span>
    </div>
    <div class="card-body"><div class="card-body-inner" id="dash-image-rank-body"></div></div>
  </div>

  <div class="card" id="dash-dimensions">
    <div class="card-header" onclick="toggleDashCard('dash-dimensions')">
      <span class="card-title">维度平均分布</span><span class="card-arrow">▼</span>
    </div>
    <div class="card-body"><div class="card-body-inner" id="dash-dimensions-body"></div></div>
  </div>

  <div class="card" id="dash-trends">
    <div class="card-header" onclick="toggleDashCard('dash-trends')">
      <span class="card-title">每日趋势</span><span class="card-arrow">▼</span>
    </div>
    <div class="card-body"><div class="card-body-inner" id="dash-trends-body"></div></div>
  </div>

  <div class="card" id="dash-heatmap">
    <div class="card-header" onclick="toggleDashCard('dash-heatmap')">
      <span class="card-title">题目回答热度图</span><span class="card-arrow">▼</span>
    </div>
    <div class="card-body"><div class="card-body-inner" id="dash-heatmap-body"></div></div>
  </div>

  <div class="card" id="dash-sessions">
    <div class="card-header" onclick="toggleDashCard('dash-sessions')">
      <span class="card-title">会话记录</span><span class="card-arrow">▼</span>
    </div>
    <div class="card-body"><div class="card-body-inner" id="dash-sessions-body"></div></div>
  </div>

  <div class="dash-footer">
    <button class="btn btn-outline btn-sm" onclick="refreshData()">🔄 刷新数据</button>
    <button class="btn btn-outline btn-sm" onclick="exportDashboardJSON()">📥 导出 JSON</button>
    <button class="btn btn-outline btn-sm" onclick="clearDashboardData()">🗑 清除本地数据</button>
    <a href="index.html" class="btn btn-outline btn-sm">← 返回测试</a>
    <span class="dash-storage-info" id="dash-storage-info"></span>
  </div>

</div>

function getEvents() {
  if (_eventsCache) return _eventsCache;
  // Fallback: localStorage only (before cloud fetch completes)
  try { return JSON.parse(localStorage.getItem('tbti_events') || '[]'); }
  catch(e) { return []; }
}

function getConfig() {
  try { return JSON.parse(localStorage.getItem('tbti_config') || '{}'); }
  catch(e) { return {}; }
}

function getCompletions() {
  return getEvents().filter(function(e) { return e.event === 'complete'; });
}

function getSessions() {
  var events = getEvents();
  var map = {};
  events.forEach(function(e) {
    if (!map[e.session]) {
      map[e.session] = { sid: e.session, first: e.ts, last: e.ts, count: 0, completed: false, typeCode: null, camp: null, nickname: null, campKey: null };
    }
    var s = map[e.session];
    if (e.ts < s.first) s.first = e.ts;
    if (e.ts > s.last) s.last = e.ts;
    s.count++;
    if (e.event === 'complete') { s.completed = true; s.typeCode = e.data.typeCode; s.camp = e.data.camp; s.nickname = e.data.nickname; s.campKey = e.data.campKey; }
  });
  return Object.values(map).sort(function(a, b) { return b.first - a.first; });
}

function formatDate(ts) {
  var d = new Date(ts);
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatTime(ts) {
  var d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}
function campColorCSS(campKey) {
  var m = { expedition:'var(--camp-expedition)', stroll:'var(--camp-stroll)', wild:'var(--camp-wild)', adventure:'var(--camp-adventure)' };
  return m[campKey] || 'var(--text)';
}

function renderOverview() {
  var events = getEvents();
  var completions = getCompletions();
  var sessions = getSessions();
  var today = formatDate(Date.now());
  var totalCompletions = completions.length;
  var totalSessions = sessions.length;
  var completionRate = totalSessions > 0 ? Math.round(totalCompletions / totalSessions * 100) : 0;
  var todayCompletions = completions.filter(function(e) { return formatDate(e.ts) === today; }).length;
  var totalDuration = 0, durationCount = 0;
  sessions.forEach(function(s) {
    if (s.completed && s.last > s.first) { totalDuration += (s.last - s.first); durationCount++; }
  });
  var avgSec = durationCount > 0 ? Math.round(totalDuration / durationCount / 1000) : 0;
  var avgMin = Math.floor(avgSec / 60); avgSec = avgSec % 60;
  var shareCount = events.filter(function(e) { return e.event === 'share'; }).length;
  var imageCount = events.filter(function(e) { return e.event === 'image'; }).length;
  var qrScans = events.filter(function(e) { return e.event === 'session_start' && e.data.source === 'qr'; }).length;
  var shareRate = totalCompletions > 0 ? Math.round(shareCount / totalCompletions * 100) : 0;
  var imageRate = totalCompletions > 0 ? Math.round(imageCount / totalCompletions * 100) : 0;

  var cards = [
    { v: totalCompletions, l: '总完成次数' },
    { v: completionRate + '%', l: '完成率' },
    { v: todayCompletions, l: '今日完成' },
    { v: avgMin + '分' + avgSec + '秒', l: '平均用时' },
    { v: shareRate + '%', l: '分享率' },
    { v: imageRate + '%', l: '卡片保存率' },
    { v: imageCount, l: '卡片生成次数' },
    { v: qrScans, l: '扫码访问数' }
  ];
  var h = '';
  cards.forEach(function(c) { h += '<div class="dash-stat-card"><div class="dash-stat-value">' + c.v + '</div><div class="dash-stat-label">' + c.l + '</div></div>'; });
  document.getElementById('dash-overview').innerHTML = h;
}

    var shareDot = shareCounts[day] > 0 ? '<span style="font-size:9px;color:#c47d7a" title="' + day + ' 分享:' + shareCounts[day] + '次">◆</span>' : '';
    var imageDot = imageCounts[day] > 0 ? '<span style="font-size:9px;color:#7b8cb8" title="' + day + ' 卡片:' + imageCounts[day] + '次">●</span>' : '';
    h += '<div class="dash-trend-col"><div class="dash-trend-dots">' + shareDot + imageDot + '</div><div class="dash-trend-bar" style="height:' + barH + 'px" title="' + day + ' 完成:' + compCounts[day] + ' 分享:' + shareCounts[day] + ' 卡片:' + imageCounts[day] + '"></div><span class="dash-trend-label-bottom">' + day.slice(5) + '</span></div>';
  });
  h += '</div><div style="display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:11px;color:var(--text-muted)"><span>◆ 分享</span><span>● 卡片</span></div>';
  document.getElementById('dash-trends-body').innerHTML = h;
}

function renderHeatmap() {
  var events = getEvents();
  var answers = events.filter(function(e) { return e.event === 'answer'; });
  if (answers.length === 0) {
    document.getElementById('dash-heatmap-body').innerHTML = '<div class="dash-empty">暂无数据</div>';
    return;
  }
  var qSums = {}, qCounts = {};
  answers.forEach(function(e) {
    var qid = e.data.questionId; if (!qid) return;
    if (!qSums[qid]) { qSums[qid] = 0; qCounts[qid] = 0; }
    qSums[qid] += e.data.value; qCounts[qid]++;
  });
  var rows = '';
  DIMENSIONS.forEach(function(dim) {
    var dimQs = QUESTIONS.filter(function(q) { return q.dim === dim.id; });
    dimQs.sort(function(a, b) { return a.id.localeCompare(b.id); });
    var cells = '';
    dimQs.forEach(function(q) {
      var avg = qCounts[q.id] ? (qSums[q.id] / qCounts[q.id]) : 0;
      var dv = avg ? avg.toFixed(1) : '—';
      var r = 220, g = 220, b = 220;
      if (avg > 0) { var t = (avg - 1) / 4; r = Math.round(100 + t * 155); g = Math.round(140 + t * 25); b = Math.round(200 - t * 160); }
      cells += '<div class="dash-heatmap-cell" style="background:rgb(' + r + ',' + g + ',' + b + ')" title="' + q.id + ': ' + dv + '">' + dv + '</div>';
    });
    rows += '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><span style="width:20px;text-align:center;font-size:0.6rem;color:var(--text-muted);flex-shrink:0">' + dim.left + '↔' + dim.right + '</span><div class="dash-heatmap-grid" style="flex:1">' + cells + '</div></div>';
  });
  document.getElementById('dash-heatmap-body').innerHTML = '<div class="dash-heatmap-container">' + rows + '</div>';
}

function renderSessionRecords(filters) {
  var sessions = getSessions();
  if (sessions.length === 0) {
    document.getElementById('dash-sessions-body').innerHTML = '<div class="dash-empty">暂无数据</div>';
    return;
  }
  filters = filters || {};

  // Collect unique values per column
  var dates = {}, nicknames = {}, typeCodes = {}, camps = {};
  sessions.forEach(function(s) {
    var d = formatDate(s.first);
    dates[d] = true;
    if (s.nickname) nicknames[s.nickname] = (nicknames[s.nickname] || 0) + 1;
    if (s.typeCode) typeCodes[s.typeCode] = true;
    if (s.campKey) camps[s.campKey] = s.camp;
  });

  // Build dropdown helper
  function buildSelect(id, values, selected, labelMap) {
    var opts = '<option value="">全部</option>';
    var keys = Object.keys(values).sort();
    keys.forEach(function(k) {
      var label = labelMap ? values[k] : (k + (values[k] > 1 ? ' (' + values[k] + ')' : ''));
      var sel = (selected === k) ? ' selected' : '';
      opts += '<option value="' + k + '"' + sel + '>' + label + '</option>';
    });
    return '<select id="' + id + '" onchange="onSessionFilter()">' + opts + '</select>';
  }

  // Count + reset
  var h = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
    '<span style="font-size:0.75rem;color:var(--text-muted)" id="session-filter-count"></span>' +
    '<button onclick="resetSessionFilters()" style="font-family:inherit;font-size:0.7rem;padding:4px 12px;border:1px solid var(--border);border-radius:20px;background:var(--card);color:var(--text-muted);cursor:pointer">清除筛选</button>' +
    '</div>';

  // Table with filters embedded in thead
  h += '<table class="dash-session-table"><thead>' +
    '<tr><th>日期</th><th>角色</th><th>结果</th><th>阵营</th><th>事件</th></tr>' +
    '<tr class="dash-filter-row">' +
      '<th>' + buildSelect('session-filter-date', dates, filters.date, null) + '</th>' +
      '<th>' + buildSelect('session-filter-role', nicknames, filters.nickname, null) + '</th>' +
      '<th>' + buildSelect('session-filter-type', typeCodes, filters.typeCode, null) + '</th>' +
      '<th>' + buildSelect('session-filter-camp', camps, filters.camp, camps) + '</th>' +
      '<th></th>' +
    '</tr>' +
    '</thead><tbody>';

  var filtered = 0;
  sessions.forEach(function(s) {
    if (filters.date && formatDate(s.first) !== filters.date) return;
    if (filters.nickname && s.nickname !== filters.nickname) return;
    if (filters.typeCode && s.typeCode !== filters.typeCode) return;
    if (filters.camp && s.campKey !== filters.camp) return;
    filtered++;
    var color = s.campKey ? campColorCSS(s.campKey) : 'var(--text)';
    h += '<tr>';
    h += '<td>' + formatDate(s.first) + ' <span style="font-size:0.65rem;color:var(--text-muted)">' + formatTime(s.first) + '</span></td>';
    h += '<td style="font-weight:500;color:' + color + '">' + (s.nickname || '—') + '</td>';
    h += '<td style="font-weight:500">' + (s.typeCode || '—') + '</td>';
    h += '<td style="color:' + color + '">' + (s.camp || '—') + '</td>';
    h += '<td>' + s.count + '</td>';
    h += '</tr>';
  });
  h += '</tbody></table>';
  document.getElementById('dash-sessions-body').innerHTML = h;
  document.getElementById('session-filter-count').textContent = filtered + ' / ' + sessions.length + ' 条';
}

function onSessionFilter() {
  var filters = {
    date:     document.getElementById('session-filter-date').value,
    nickname: document.getElementById('session-filter-role').value,
    typeCode: document.getElementById('session-filter-type').value,
    camp:     document.getElementById('session-filter-camp').value
  };
  renderSessionRecords(filters);
}

function resetSessionFilters() {
  document.getElementById('session-filter-date').value = '';
  document.getElementById('session-filter-role').value = '';
  document.getElementById('session-filter-type').value = '';
  document.getElementById('session-filter-camp').value = '';
  renderSessionRecords({});
}

function renderStorageInfo() {
  var events = getEvents();
  var kb = (JSON.stringify(events).length / 1024).toFixed(1);
  var info = '共 ' + events.length + ' 条事件, 约 ' + kb + ' KB';
  if (_sourceInfo) info += ' | ' + _sourceInfo;
  document.getElementById('dash-storage-info').textContent = info;
}

function renderAllDashboardCharts() {
  var events = getEvents();
  if (events.length === 0) {
    document.getElementById('dash-overview').innerHTML = '<div class="dash-empty" style="grid-column:1/-1">暂无数据 — 完成一次测试后将自动记录</div>';
    ['dash-personality-body','dash-camp-body','dash-image-rank-body','dash-dimensions-body','dash-trends-body','dash-heatmap-body','dash-sessions-body'].forEach(function(id) { document.getElementById(id).innerHTML = '<div class="dash-empty">暂无数据</div>'; });
    renderStorageInfo();
    return;
  }
  renderOverview(); renderPersonalityDist(); renderCampDist(); renderImageRank(); renderDimensionAnalysis();
  renderDailyTrends(); renderHeatmap(); renderSessionRecords(); renderStorageInfo();
}

// ---- Cloud data loading ----

function loadEvents() {
  return new Promise(function(resolve) {
    var localEvents = [];
    try { localEvents = JSON.parse(localStorage.getItem('tbti_events') || '[]'); } catch(e) {}

    if (!SB_ENABLED) {
      _eventsCache = localEvents;
      _sourceInfo = '仅本地存储';
      resolve(_eventsCache);
      return;
    }

    _sourceInfo = '本地 ' + localEvents.length + ' 条';

    // 从 Supabase 分页拉取全部事件
    fetchAllFromCloud(0, [], function(cloudEvents) {
      // 合并：云端 + 本地，按 session+ts 去重
      var seen = {};
      var merged = [];
      localEvents.forEach(function(e) {
        var key = e.session + '_' + e.ts;
        if (!seen[key]) { seen[key] = true; merged.push(e); }
      });
      cloudEvents.forEach(function(e) {
        var key = e.session + '_' + e.ts;
        if (!seen[key]) { seen[key] = true; merged.push(e); }
      });
      // 按时间排序
      merged.sort(function(a, b) { return (a.ts || 0) - (b.ts || 0); });

      _eventsCache = merged;
      _sourceInfo = '云端 ' + cloudEvents.length + ' + 本地 ' + localEvents.length + ' → 去重 ' + merged.length + ' 条';
      resolve(merged);
    });
  });
}

function fetchAllFromCloud(offset, accumulated, callback) {
  var url = SB_ENDPOINT + '?select=*&order=ts.asc&limit=1000&offset=' + offset;
  fetch(url, {
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY
    }
  }).then(function(r) { return r.json(); }).then(function(rows) {
    if (Array.isArray(rows) && rows.length > 0) {
      accumulated = accumulated.concat(rows);
      if (rows.length >= 1000) {
        fetchAllFromCloud(offset + 1000, accumulated, callback);
      } else {
        callback(accumulated);
      }
    } else {
      callback(accumulated);
    }
  }).catch(function() {
    // 网络错误：仅用本地数据
    callback([]);
  });
}

function refreshData() {
  document.getElementById('dash-overview').innerHTML = '<div class="dash-empty" style="grid-column:1/-1">🔄 正在从云端拉取数据…</div>';
  loadEvents().then(function() {
    renderAllDashboardCharts();
  });
}



function toggleDashCard(id) { document.getElementById(id).classList.toggle('open'); }

function exportDashboardJSON() {
  var data = { exportedAt: new Date().toISOString(), config: getConfig(), events: getEvents(), eventCount: getEvents().length };
  var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'tbti_data_' + new Date().toISOString().slice(0, 10) + '.json';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
}

function clearDashboardData() {
  if (!confirm('确定要清除本地追踪数据吗？（云端数据不会受影响）此操作不可撤销。')) return;
  try { localStorage.removeItem('tbti_events'); localStorage.removeItem('tbti_config'); } catch(e) {}
  _eventsCache = null;
  _sourceInfo = '';
  refreshData();
}

/* ============================================================
   INIT
   ============================================================ */
document.addEventListener('DOMContentLoaded', function() {
  // 显示加载状态
  document.getElementById('dash-overview').innerHTML = '<div class="dash-empty" style="grid-column:1/-1">🔄 正在加载数据…</div>';
  // 先从云端 + 本地加载数据，再渲染图表
  loadEvents().then(function() {
    renderAllDashboardCharts();
  });
});
</script>
